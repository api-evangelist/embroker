aid: embroker
name: Embroker
description: Embroker is a San Francisco-based digital business insurance broker and
  insurtech platform founded in 2015 by Matt Miller, on a mission to make commercial
  insurance simple, clear, and tailored to each industry. Embroker operates a digital-first
  online platform where businesses can compare, quote, purchase, and manage commercial
  insurance policies directly, with industry-specific programs for funded startups,
  tech companies, law firms, venture capital and private equity firms, financial services
  professionals, consultants, real estate agents, and small businesses. Its coverage
  portfolio includes Business Owners Policy (BOP), commercial general liability, professional
  liability, technology errors and omissions, cyber insurance, directors and officers,
  employment practices liability, commercial crime, key person, workers compensation,
  and lawyers professional liability, often bundled into industry packages such as
  the Startup Bundle, Law Bundle, and MPL Bundle. In 2017 Embroker partnered with
  Munich Re to underwrite its own digital insurance products; in 2020 it launched
  Embroker Access for retail and wholesale brokers; and in 2023 it launched Embroker
  One, an AI- and machine-learning-driven platform for real-time risk assessment and
  policy recommendations. The company has protected 9,500+ businesses across 16,000+
  policies and raised a $100M round in 2021 led by FTV Capital. Embroker's revenue
  model is brokerage commissions, managing general agent (MGA) underwriting fees on
  its own products, and platform access for partner brokers; there is no public developer
  API, SDK, or open-source release — its GitHub organization contains only archived
  forks of third-party libraries and a small number of internal tooling repositories.
